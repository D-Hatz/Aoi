# Migration configuration for other_db (replica).
# Reuses the same version scripts as alembic.ini (shared versions/).

[alembic]
script_location = %(here)s/alembic_other
version_locations = %(here)s/alembic/versions

prepend_sys_path = .
path_separator = os

# Placeholder — not used. env.py reads MIGRATION_OTHER_URL from kokoro.settings.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
